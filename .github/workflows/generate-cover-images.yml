name: Generate Blog Post Cover Images
on:
  pull_request:
    types: [opened]
    paths:
      - 'src/content/blog/**.md'
permissions:
  contents: write  # Required to commit and push generated images
  pull-requests: read  # Required to read PR information
  issues: write  # Required to comment on PRs (PR comments use issues API)

jobs:
  generate-covers:
    name: Generate cover images for new blog posts
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Fetch full history to compare with base branch
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Detect new blog posts
        id: detect
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          NEW_FILES=$(git diff --name-only --diff-filter=A \
            origin/${{ github.event.pull_request.base.ref }}...HEAD \
            -- 'src/content/blog/*.md' || echo "")
          
          if [ -z "$NEW_FILES" ]; then
            echo "✅ No new blog posts detected in this PR"
            echo "has_new_posts=false" >> $GITHUB_OUTPUT
          else
            echo "📝 New blog posts detected:"
            echo "$NEW_FILES" | while read -r file; do
              echo "  - $file"
            done
            
            echo "$NEW_FILES" > new_posts.txt
            echo "has_new_posts=true" >> $GITHUB_OUTPUT
          fi
          
      - name: Generate cover images
        if: steps.detect.outputs.has_new_posts == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -e
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "❌ OPENAI_API_KEY secret is not configured"
            echo "Please add the secret in repository settings: Settings → Secrets and variables → Actions"
            exit 1
          fi
          
          FAILED=0
          while IFS= read -r post_file; do
            [ -z "$post_file" ] && continue
            
            echo "════════════════════════════════════════════════════════════════"
            echo "🎨 Generating cover image for: $post_file"
            echo "════════════════════════════════════════════════════════════════"
            
            if npm run generate-cover -- --post "$post_file"; then
              echo "✅ Successfully generated cover for $post_file"
            else
              echo "❌ Failed to generate cover for $post_file"
              FAILED=1
            fi
            echo ""
          done < new_posts.txt
          
          if [ $FAILED -eq 1 ]; then
            echo "❌ One or more cover images failed to generate"
            exit 1
          fi
          
      - name: Commit and push generated images
        if: steps.detect.outputs.has_new_posts == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add generated WebP images in assets directory
          git add src/assets/*-cover.webp 2>/dev/null || true
          
          # Check if there are any changes to commit
          if git diff --staged --quiet; then
            echo "ℹ️  No new cover images to commit (they may already exist)"
          else
            COMMIT_MSG="chore: generate cover images for new blog posts

            Automatically generated by GitHub Actions workflow.
            Images generated using OpenAI GPT-Image-1.5 model."
            
            git commit -m "$COMMIT_MSG"
            git push
            
            echo "✅ Cover images committed and pushed to PR branch"
          fi
          
      - name: Comment on PR (success)
        if: steps.detect.outputs.has_new_posts == 'true' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const newPosts = fs.readFileSync('new_posts.txt', 'utf8').trim().split('\n');
            const postList = newPosts.map(p => `- \`${p}\``).join('\n');
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🎨 Cover Images Generated\n\nI've automatically generated cover images for the following blog posts:\n\n${postList}\n\nThe images have been committed to this PR. Please review them in the \`src/assets/\` directory.\n\n**Format:** WebP (1536×1024)\n**Model:** GPT-Image-1.5\n**Quality:** High`
            });
            
      - name: Comment on PR (failure)
        if: steps.detect.outputs.has_new_posts == 'true' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ Cover Image Generation Failed\n\nThere was an error generating cover images for this PR. Please check the [workflow logs](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.\n\nCommon issues:\n- OpenAI API key not configured or invalid\n- OpenAI API rate limits or quota exceeded\n- Invalid blog post format or content\n\nYou can manually generate covers using:\n\`\`\`bash\nnpm run generate-cover -- --post src/content/blog/your-post.md\n\`\`\``
            });
